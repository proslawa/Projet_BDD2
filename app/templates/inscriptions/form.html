{% extends "base.html" %}
{% block title %}Nouvelle inscription{% endblock %}
{% block page_title %}Nouvelle inscription{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('inscriptions.index') }}" class="btn btn-secondary btn-sm">← Retour</a>{% endblock %}
{% block content %}
<div style="max-width:540px"><div class="card">
  <form method="POST">
    <div class="form-group"><label class="form-label">Étudiant</label>
      <select name="id_etudiant" class="form-input form-select" required>
        <option value="">— Choisir —</option>{% for e in etudiants %}<option value="{{ e.id }}">{{ e.label }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Classe</label>
      <select name="id_classe" class="form-input form-select" required>
        <option value="">— Choisir —</option>{% for c in classes %}<option value="{{ c.id }}">{{ c.label }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Année académique</label>
      <select name="id_annee" class="form-input form-select" required>
        <option value="">— Choisir —</option>{% for a in annees %}<option value="{{ a.id }}">{{ a.label }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Date d'inscription</label>
      <input class="form-input" type="date" name="date_inscription"></div>
    <button type="submit" class="btn btn-primary">Créer l'inscription</button>
  </form>
</div></div>
{% endblock %}
