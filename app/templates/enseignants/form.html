{% extends "base.html" %}
{% block title %}{{ action }} enseignant{% endblock %}
{% block page_title %}{{ action }} un enseignant{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('enseignants.index') }}" class="btn btn-secondary btn-sm">← Retour</a>{% endblock %}
{% block content %}
<div style="max-width:540px"><div class="card">
  <form method="POST">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Nom</label><input class="form-input" name="nom" value="{{ enseignant.nom if enseignant else '' }}" required></div>
      <div class="form-group"><label class="form-label">Prénom</label><input class="form-input" name="prenom" value="{{ enseignant.prenom if enseignant else '' }}" required></div>
    </div>
    <div class="form-group"><label class="form-label">Grade</label>
      <select name="grade" class="form-input form-select">
        {% for g in ['Professeur','Maître de Conférences','Assistant','Chargé de Cours'] %}
        <option {% if enseignant and enseignant.grade==g %}selected{% endif %}>{{ g }}</option>
        {% endfor %}
      </select></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" name="email" value="{{ enseignant.email if enseignant else '' }}" required></div>
    {% if not enseignant %}<div class="form-group"><label class="form-label">Mot de passe</label><input class="form-input" type="password" name="mot_de_passe" required></div>{% endif %}
    <button type="submit" class="btn btn-primary">{{ action }} l'enseignant</button>
  </form>
</div></div>
{% endblock %}
