{% extends "base.html" %}
{% block title %}Créer une évaluation{% endblock %}
{% block page_title %}Créer une évaluation{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('notes.index') }}" class="btn btn-secondary btn-sm">← Retour</a>{% endblock %}
{% block content %}
<div style="max-width:540px"><div class="card">
  <form method="POST">
    <div class="form-group"><label class="form-label">Matière</label>
      <select name="id_matiere" class="form-input form-select" required>
        <option value="">— Choisir —</option>{% for m in matieres %}<option value="{{ m.id }}">S{{ m.semestre }} · {{ m.ue }} · {{ m.nom }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Type d'évaluation</label>
      <select name="type_evaluation" class="form-input form-select" required>
        {% for t in ['Devoir','Examen','TP','Projet','Exposé','Rattrapage'] %}<option>{{ t }}</option>{% endfor %}</select></div>
    <div class="form-group"><label class="form-label">Date de l'évaluation</label>
      <input class="form-input" type="date" name="date_evaluation" required></div>
    <button type="submit" class="btn btn-primary">Créer l'évaluation</button>
  </form>
</div></div>
{% endblock %}
